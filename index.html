.stat{

backdrop-filter:blur(15px);

border-radius:18px;

.stat h2{

.stat span{

.search-box{

.tabs{

.tabs::-webkit-scrollbar{

.tab{

padding:10px 18px;

background:#1e293b;

}

.tab:hover{

}

.tab.active{

/* PAGE */

.page{

max-width:1200px;

margin-bottom:25px;
font-size:28px;

}

/* FILE GRID */

.files{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* FILE CARD */

.file-card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.file-card:hover{
transform:translateY(-6px);
border-color:#3b82f6;
}

.file-header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.04);
font-weight:600;
}

.badge{
padding:5px 10px;
border-radius:20px;
background:#2563eb;
font-size:11px;
}

.download{
display:inline-flex;
justify-content:center;
align-items:center;
margin:15px;
padding:10px 18px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
border-radius:30px;
text-decoration:none;
color:white;
font-weight:600;
transition:.3s;
}

.download:hover{
transform:scale(1.05);
}

.premium-section{
display:none;
margin-top:30px;
}

.premium-title{
text-align:center;
font-size:28px;
margin-bottom:10px;
color:#facc15;
}

.premium-subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

.pricing-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:linear-gradient(180deg,#111827,#020617);
border:1px solid #facc15;
border-radius:20px;
padding:25px;
text-align:center;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
}

.popular{
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
background:#facc15;
color:black;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 24px;
background:linear-gradient(90deg,#facc15,#f59e0b);
color:black;
text-decoration:none;
border-radius:30px;
font-weight:700;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#25D366;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,.35);
z-index:999;
}

@media(max-width:768px){

.hero h1{
font-size:28px;
}

.page-title{
font-size:22px;
}

.files{
grid-template-columns:1fr;
}

}

<script>

let currentType = "hat";

function selectSection(type,title,btn){

currentType=type;

document.getElementById("sectionTitle").innerText=title;

document.getElementById("premiumSection").style.display="none";

document.getElementById("files").style.display="grid";

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

if(btn) btn.classList.add("active");

loadFiles();

}

function showPremium(btn){

document.getElementById("files").style.display="none";

document.getElementById("premiumSection").style.display="block";

document.getElementById("sectionTitle").innerText="⭐ PREMIUM ACCESS";

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

if(btn) btn.classList.add("active");

}

function loadFiles(){

fetch("./files.json")

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("files");

container.innerHTML="";

let total=0;

data.forEach(file=>{

if(file.type===currentType){

total++;

let card=document.createElement("div");

card.className="file-card";

card.innerHTML=`

<div class="file-header">

<span>📄 ${file.name}</span>

<span class="badge">

${file.badge || "NEW"}

</span>

</div>

<div style="padding:15px;">

<a href="${file.link}"

target="_blank"

class="download">

⬇ Download

</a>

</div>

`;

container.appendChild(card);

}

});

document.getElementById("fileCount").innerText=total;

});

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".file-card").forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(value)

? ""

: "none";

});

});

loadFiles();

</script>
