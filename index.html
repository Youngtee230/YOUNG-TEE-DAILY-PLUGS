<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUNG TEE DAILY PLUGS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */
.navbar{
height:65px;
display:flex;
align-items:center;
justify-content:center;
position:sticky;
top:0;
background:#020617;
border-bottom:1px solid #1e293b;
z-index:999;
}

.logo{
font-size:20px;
font-weight:700;
letter-spacing:1px;
}

.hamburger{
position:absolute;
left:20px;
font-size:24px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
border-right:1px solid #1e293b;
transition:0.3s;
padding-top:70px;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-item{
padding:16px 20px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.menu-item:hover{
background:#1e293b;
padding-left:25px;
}

/* PAGE */
.page{
padding:25px;
max-width:1100px;
margin:auto;
}

.page-title{
margin-bottom:20px;
font-size:24px;
font-weight:600;
text-align:center;
}

/* FILE GRID */
.files{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
}

/* FILE CARD */
.file-card{
background:#020617;
border:1px solid #1e293b;
border-radius:16px;
overflow:hidden;
transition:0.2s;
}

.file-card:hover{
transform:translateY(-5px);
border-color:#2563eb;
}

/* HEADER */
.file-header{
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
font-size:14px;
}

/* BADGE */
.badge{
padding:4px 10px;
font-size:11px;
border-radius:20px;
background:#2563eb;
}

/* DOWNLOAD BUTTON */
.download{
display:inline-block;
margin:12px;
padding:8px 16px;
font-size:14px;
text-align:center;
background:#2563eb;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:500;
transition:0.2s;
}

.download:hover{
background:#1d4ed8;
transform:scale(1.03);
}

/* PREMIUM */
.premium-section{
margin-top:40px;
display:none;
}

.premium-title{
text-align:center;
margin-bottom:25px;
color:gold;
font-size:20px;
}

.card{
background:#020617;
border:1px solid gold;
border-radius:16px;
padding:25px;
text-align:center;
margin-bottom:20px;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card h2{
color:gold;
margin:10px 0;
}

.btn{
display:inline-block;
padding:12px 22px;
background:gold;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:600;
margin-top:10px;
}

/* SCROLLBAR (small detail but nice) */
::-webkit-scrollbar{
width:6px;
}
::-webkit-scrollbar-thumb{
background:#2563eb;
border-radius:10px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="logo">YOUNG TEE DAILY PLUGS</div>
</div>

<div class="sidebar" id="menu">

<div class="menu-item" onclick="selectSection('hat','HA TUNNEL FILES')">HA TUNNEL FILES</div>
<div class="menu-item" onclick="selectSection('tls','TLS TUNNEL FILES')">TLS TUNNEL FILES</div>
<div class="menu-item" onclick="selectSection('hc','HTTP CUSTOM FILES')">HTTP CUSTOM FILES</div>
<div class="menu-item" onclick="selectSection('ink','LINKLAYER VPN FILES')">LINKLAYER VPN FILES</div>
<div class="menu-item" onclick="showPremium()">⭐ PREMIUM ACCESS</div>

</div>

<div class="page">

<h2 class="page-title" id="sectionTitle">HA TUNNEL FILES</h2>

<div class="files" id="files"></div>

<div class="premium-section" id="premiumSection">

<h2 class="premium-title">⭐ PREMIUM ACCESS ⭐<br>VODACOM & TELKOM UNLIMITED</h2>

<div class="card">
<h3>7 DAYS</h3>
<h2>R30.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

<div class="card">
<h3>14 DAYS</h3>
<h2>R40.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

<div class="card">
<h3>30 DAYS</h3>
<h2>R60.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

let currentType="hat";

function selectSection(type,title){

currentType=type;

document.getElementById("sectionTitle").innerText=title;

document.getElementById("premiumSection").style.display="none";

closeMenu();

loadFiles();
}

function showPremium(){

closeMenu();

document.getElementById("files").innerHTML="";

document.getElementById("premiumSection").style.display="block";

document.getElementById("sectionTitle").innerText="⭐ PREMIUM ACCESS";

}

function loadFiles(){

fetch("./files.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("files");
container.innerHTML="";

data.forEach(file=>{

if(file.type===currentType){

let card=document.createElement("div");
card.className="file-card";

card.innerHTML=`
<div class="file-header">
<span>${file.name}</span>
<span class="badge">${file.badge || ""}</span>
</div>
<a href="${file.link}" target="_blank" class="download">Download</a>
`;

container.appendChild(card);
}

});

});
}

selectSection("hat","HA TUNNEL FILES");

</script>

</body>
</html>
