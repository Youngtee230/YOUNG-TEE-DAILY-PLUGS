<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */
.navbar{
height:60px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:18px;
font-weight:600;
}

.hamburger{
position:absolute;
left:20px;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#020617;
border-right:1px solid #1e293b;
transition:0.3s;
padding-top:60px;
z-index:1000;
}

.sidebar.active{
left:0;
}

.menu-item{
padding:15px 20px;
cursor:pointer;
}

.menu-item:hover{
background:#1e293b;
}

/* PAGE */
.page{
padding:20px;
}

.page-title{
margin-bottom:15px;
font-size:20px;
}

/* FILES */
.files{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.file-card{
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
overflow:hidden;
}

.file-header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
}

.badge{
padding:4px 8px;
font-size:11px;
border-radius:20px;
background:#2563eb;
}

.download{
display:block;
margin:12px;
padding:10px;
text-align:center;
background:#2563eb;
border-radius:8px;
color:white;
text-decoration:none;
}

.download:hover{
background:#1d4ed8;
}

/* PREMIUM */
.premium-section{
margin-top:30px;
display:none;
}

.premium-title{
text-align:center;
margin-bottom:20px;
color:gold;
}

.card{
background:#020617;
border:1px solid gold;
border-radius:12px;
padding:20px;
text-align:center;
margin-bottom:15px;
}

.card h2{
color:gold;
margin:10px 0;
}

.btn{
display:inline-block;
padding:10px 18px;
background:gold;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="navbar">
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="logo">YOUNG TEE DAILY PLUGS</div>
</div>

<div class="sidebar" id="menu">

<div class="menu-item" onclick="selectSection('hat','HA TUNNEL FILES')">HA TUNNEL FILES</div>
<div class="menu-item" onclick="selectSection('tls','TLS TUNNEL FILES')">TLS TUNNEL FILES</div>
<div class="menu-item" onclick="selectSection('hc','HTTP CUSTOM FILES')">HTTP CUSTOM FILES</div>
<div class="menu-item" onclick="selectSection('lnk','LINKLAYER VPN FILES')">LINKLAYER VPN FILES</div>
<div class="menu-item" onclick="showPremium()">⭐ PREMIUM ACCESS</div>

</div>

<div class="page">

<h2 class="page-title" id="sectionTitle">HA TUNNEL FILES</h2>

<div class="files" id="files"></div>

<div class="premium-section" id="premiumSection">

<h2 class="premium-title">⭐ PREMIUM ACCESS ⭐</h2>

<div class="card">
<h3>7 DAYS PREMIUM</h3>
<h2>R10.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

<div class="card">
<h3>14 DAYS PREMIUM</h3>
<h2>R15.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

<div class="card">
<h3>30 DAYS PREMIUM</h3>
<h2>R20.00</h2>
<a href="https://wa.me/27634179556" target="_blank" class="btn">Buy Now</a>
</div>

</div>

</div>

<!-- ADSTERra -->
<script src="https://pl28666673.effectivegatecpm.com/64/dd/37/64dd37a14121a6faa52c6a38719e8121.js"></script>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

let currentType="hat";

function selectSection(type,title){

currentType=type;

document.getElementById("sectionTitle").innerText=title;

document.getElementById("premiumSection").style.display="none";

closeMenu();

loadFiles();
}

function showPremium(){

closeMenu();

document.getElementById("files").innerHTML="";

document.getElementById("premiumSection").style.display="block";

document.getElementById("sectionTitle").innerText="⭐ PREMIUM ACCESS";

}

function loadFiles(){

fetch("./files.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("files");
container.innerHTML="";

data.forEach(file=>{

if(file.type===currentType){

let card=document.createElement("div");
card.className="file-card";

card.innerHTML=`
<div class="file-header">
<span>${file.name}</span>
<span class="badge">${file.badge || ""}</span>
</div>
<a href="${file.link}" target="_blank" class="download">Download</a>
`;

container.appendChild(card);
}

});

});
}

selectSection("hat","HA TUNNEL FILES");

</script>

</body>
</html>
